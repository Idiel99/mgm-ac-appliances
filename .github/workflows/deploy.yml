name: Deploy MGM AC Appliances

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI budgets
        run: npm run perf:lhci
      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report
          path: ./.lighthouseci
      - name: Run WebPageTest guardrail (optional)
        run: npm run perf:wpt
        env:
          WPT_API_KEY: ${{ secrets.WPT_API_KEY }}
          WPT_TEST_URL: ${{ vars.WPT_TEST_URL }}
          WPT_LOCATION: ${{ vars.WPT_LOCATION }}
          WPT_CONNECTIVITY: ${{ vars.WPT_CONNECTIVITY }}
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: [build, performance]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

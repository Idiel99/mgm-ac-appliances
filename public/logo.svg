<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle — AC vent ring -->
  <circle cx="60" cy="60" r="56" stroke="#0EA5E9" stroke-width="3" opacity="0.25"/>
  <circle cx="60" cy="60" r="48" stroke="#0EA5E9" stroke-width="2" opacity="0.15"/>

  <!-- Inner filled circle — dark backdrop -->
  <circle cx="60" cy="60" r="44" fill="#0F172A"/>

  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="38" fill="url(#logo-glow)"/>

  <!-- Snowflake / fan blade arm at 0° -->
  <g transform="translate(60,60) rotate(0)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Arm at 60° -->
  <g transform="translate(60,60) rotate(60)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Arm at 120° -->
  <g transform="translate(60,60) rotate(120)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Arm at 180° -->
  <g transform="translate(60,60) rotate(180)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Arm at 240° -->
  <g transform="translate(60,60) rotate(240)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Arm at 300° -->
  <g transform="translate(60,60) rotate(300)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#BAE6FD" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="-7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-14" x2="7" y2="-21" stroke="#BAE6FD" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#0EA5E9"/>
  </g>

  <!-- Center hub — fan motor -->
  <circle cx="60" cy="60" r="6" fill="#0EA5E9"/>
  <circle cx="60" cy="60" r="3.5" fill="#0F172A"/>
  <circle cx="60" cy="60" r="1.8" fill="#BAE6FD"/>

  <!-- Curved airflow lines -->
  <path d="M 30 38 Q 38 30, 50 28" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 26 50 Q 32 40, 44 35" stroke="#0EA5E9" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M 90 82 Q 82 90, 70 92" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 94 70 Q 88 80, 76 85" stroke="#0EA5E9" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Outer accent dots — condensation -->
  <circle cx="24" cy="60" r="1.5" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="96" cy="60" r="1.5" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="60" cy="24" r="1.5" fill="#BAE6FD" opacity="0.5"/>
  <circle cx="60" cy="96" r="1.5" fill="#BAE6FD" opacity="0.5"/>
</svg>
